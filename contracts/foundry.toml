[profile.default]
src = "src"
out = "out"
script = "scripts"
libs = ["lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
base = "${BASE_MAINNET_RPC}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
