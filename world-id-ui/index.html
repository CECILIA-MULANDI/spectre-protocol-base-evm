<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectre — World ID Proof</title>
    <style>
      body { font-family: monospace; max-width: 640px; margin: 4rem auto; padding: 0 1rem; background: #0a0a0a; color: #e0e0e0; }
      h1 { font-size: 1.2rem; color: #fff; margin-bottom: 0.25rem; }
      p  { color: #888; font-size: 0.85rem; margin: 0 0 1.5rem; }
      label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 0.25rem; }
      input { width: 100%; box-sizing: border-box; background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 0.5rem 0.75rem; font-family: monospace; font-size: 0.85rem; border-radius: 4px; margin-bottom: 1rem; }
      input:focus { outline: none; border-color: #555; }
      button { background: #2a2a2a; border: 1px solid #444; color: #e0e0e0; padding: 0.6rem 1.2rem; font-family: monospace; font-size: 0.85rem; border-radius: 4px; cursor: pointer; }
      button:hover { background: #333; }
      button:disabled { opacity: 0.4; cursor: default; }
      pre  { background: #111; border: 1px solid #2a2a2a; padding: 1rem; border-radius: 4px; font-size: 0.75rem; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
      .signal { font-size: 0.75rem; color: #666; margin-bottom: 1.5rem; word-break: break-all; }
      .warn { color: #f59e0b; font-size: 0.8rem; margin-bottom: 1.5rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
